name: Daily Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "35 23 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Refresh central bank report
        run: node scripts/update-report.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'high' }}
          OPENAI_TIMEZONE: ${{ vars.OPENAI_TIMEZONE || 'America/Toronto' }}
          OPENAI_COUNTRY: ${{ vars.OPENAI_COUNTRY || 'CA' }}
          OPENAI_CITY: ${{ vars.OPENAI_CITY || 'Toronto' }}
          OPENAI_REGION: ${{ vars.OPENAI_REGION || 'Ontario' }}

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report.json data/report.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh central bank report"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
